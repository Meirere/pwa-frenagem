  <main>

        <select id="tipoFator" onchange="atualizarCamposFator()">

        <select id="tipoTopografia" onchange="atualizarCamposTopografia()">

      <input id="latitude" type="number" value="-8.032198" step="0.000001">

<script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

window.onload = function () {
    atualizarCamposMarca();
    atualizarCamposFator();
    atualizarCamposTopografia();
};

function valor(id) {
  return parseFloat(document.getElementById(id).value);
}

function textoValor(id) {
  return document.getElementById(id).value.trim();
}

function contarAlgarismosSignificativos(texto) {
  texto = texto.replace(",", ".");

  let digitos = texto.replace(".", "");

  digitos = digitos.replace(/^0+/, "");

  return digitos.length === 0 ? 1 : digitos.length;
}

function grausParaRad(graus) {
  return graus * Math.PI / 180;
}

function arredondarSig(valor, nSig) {
    return Number(valor.toPrecision(nSig));
}

function atualizarCamposTopografia() {

  const tipo = document.getElementById("tipoTopografia").value;
  const div = document.getElementById("camposTopografia");

  if (tipo === "plana") {
    div.innerHTML = `
      <p><strong>Inclinação considerada:</strong> 0°</p>
    `;
  } else {
    div.innerHTML = `
      <label>Inclinação média da via (graus)</label>
      <input id="anguloVia" type="number" value="5" step="0.1">

      <p>Será adotada distribuição uniforme com variação de ±1°.</p>
    `;
  }
}

function atualizarCamposMarca() {

    const tipoMarca = document.getElementById("tipoMarca").value;
    const div = document.getElementById("camposMarca");

    if (tipoMarca === "uniforme") {

        div.innerHTML = `
            <label>Comprimento mínimo da marca (m)</label>
            <input id="marcaMin" type="number" value="29" step="0.01">

            <label>Comprimento máximo da marca (m)</label>
            <input id="marcaMax" type="number" value="31" step="0.01">
        `;

    } else {

        div.innerHTML = `
            <label>Comprimento da marca (m)</label>
            <input id="marca" type="number" value="30" step="0.01">

            <label>Desvio padrão (m)</label>
            <input id="desvioMarca" type="number" value="1" step="0.01">
        `;

    }

}

function atualizarCamposFator() {

    const tipo = document.getElementById("tipoFator").value;
    const div = document.getElementById("camposFator");

    if (tipo === "uniforme") {

        div.innerHTML = `
            <label>Fator de arrasto mínimo</label>
            <input id="miMin" type="number" value="0.65" step="0.01">

            <label>Fator de arrasto máximo</label>
            <input id="miMax" type="number" value="0.75" step="0.01">
        `;

    } else {

        div.innerHTML = `
            <label>Fator de arrasto médio</label>
            <input id="mi" type="number" value="0.70" step="0.01">

            <label>Desvio padrão</label>
            <input id="desvioMi" type="number" value="0.05" step="0.001">
        `;

    }

}

function sortearAnguloTopografia() {

  const tipo = document.getElementById("tipoTopografia").value;

  if (tipo === "plana") {
    return 0;
  }

  const anguloMedio = valor("anguloVia");

  const anguloMin = anguloMedio - 1;
  const anguloMax = anguloMedio + 1;

  return anguloMin + Math.random() * (anguloMax - anguloMin);
}

function gerarPDF() {

  const tipoMarca = document.getElementById("tipoMarca").value;
  const tipoFator = document.getElementById("tipoFator").value;
  const tipoTopografia = document.getElementById("tipoTopografia").value;

  const params = {
    tipoMarca: tipoMarca,
    tipoFator: tipoFator,
    tipoTopografia: tipoTopografia,

    latitudeGraus: valor("latitude"),

    marca: document.getElementById("marca") ? valor("marca") : null,
    desvioMarca: document.getElementById("desvioMarca") ? valor("desvioMarca") : null,
    marcaMin: document.getElementById("marcaMin") ? valor("marcaMin") : null,
    marcaMax: document.getElementById("marcaMax") ? valor("marcaMax") : null,

    mi: document.getElementById("mi") ? valor("mi") : null,
    desvioMi: document.getElementById("desvioMi") ? valor("desvioMi") : null,
    miMin: document.getElementById("miMin") ? valor("miMin") : null,
    miMax: document.getElementById("miMax") ? valor("miMax") : null,

    anguloVia: document.getElementById("anguloVia") ? valor("anguloVia") : 0
  };

  let algSigMarca;
  let algSigMi;

  if (tipoMarca === "normal") {
    algSigMarca = contarAlgarismosSignificativos(textoValor("marca"));
  } else {
    algSigMarca = Math.min(
      contarAlgarismosSignificativos(textoValor("marcaMin")),
      contarAlgarismosSignificativos(textoValor("marcaMax"))
    );
  }

  if (tipoFator === "normal") {
    algSigMi = contarAlgarismosSignificativos(textoValor("mi"));
  } else {
    algSigMi = Math.min(
      contarAlgarismosSignificativos(textoValor("miMin")),
      contarAlgarismosSignificativos(textoValor("miMax"))
    );
  }

  const algSigResultado = Math.min(algSigMarca, algSigMi);

  if (isNaN(params.latitudeGraus)) {
    alert("Preencha corretamente a latitude.");
    return;
  }

  if (params.tipoMarca === "normal" && params.desvioMarca > params.marca) {
    alert("Valor inválido: o desvio padrão da marca de frenagem não pode ser maior que o comprimento informado.");
    return;
  }

  if (params.tipoFator === "normal" && params.desvioMi > params.mi) {
    alert("Valor inválido: o desvio padrão do fator de arrasto não pode ser maior que o fator de arrasto médio informado.");
    return;
  }

  const r = velocidadeMonteCarlo(params);

  if (!r) {
    alert("Não foi possível calcular. Verifique os dados informados.");
    return;
  }

  const mediaSig = arredondarSig(r.velocidadeMaisProvavelKmh, algSigResultado);

  const casas = mediaSig.toString().includes(".")
    ? mediaSig.toString().split(".")[1].length
    : 0;

  const desvioSig = r.desvioPadraoKmh.toFixed(casas);
  const vMinSig = r.intervalo95Kmh[0].toFixed(casas);
  const vMaxSig = r.intervalo95Kmh[1].toFixed(casas);

  let doc;

  if (window.jspdf && window.jspdf.jsPDF) {
    doc = new window.jspdf.jsPDF();
  } else if (window.jsPDF) {
    doc = new window.jsPDF();
  } else {
    alert("A biblioteca jsPDF não foi carregada corretamente.");
    return;
  }

  let y = 15;

  function verificarPagina(alturaNecessaria = 20) {
    if (y + alturaNecessaria > 280) {
      doc.addPage();
      y = 15;
    }
  }

  function titulo(texto) {
    verificarPagina(15);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(13);
    doc.text(texto, 15, y);
    y += 8;
  }

  function paragrafo(texto) {
    verificarPagina(25);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    const linhas = doc.splitTextToSize(texto, 180);
    doc.text(linhas, 15, y);
    y += linhas.length * 5 + 4;
  }

  function linha(texto) {
    verificarPagina(8);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(texto, 15, y);
    y += 6;
  }

  function linhaCampo(campo, valorCampo) {
    verificarPagina(8);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.text(campo, 15, y);

    const larguraCampo = doc.getTextWidth(campo);

    doc.setFont("helvetica", "normal");
    doc.text(String(valorCampo), 15 + larguraCampo + 2, y);

    y += 6;
  }

  titulo("1. Modelo matemático");

  paragrafo(
    "A velocidade inicial do veículo foi estimada a partir do comprimento da marca de frenagem, empregando-se modelo físico baseado na Segunda Lei de Newton e pelo Teorema da energia cinética."
  );

  paragrafo(
    "Admitindo frenagem com desaceleração aproximadamente constante, a velocidade foi calculada pela expressão abaixo:"
  );

  const formulaImg = document.getElementById("formulaModelo");

  verificarPagina(85);

  if (formulaImg && formulaImg.complete && formulaImg.naturalWidth > 0) {
    doc.addImage(formulaImg, "PNG", 60, y, 80, 50);
    y += 44;
  } else {
    linha("V = √(2 × g × d × (μ × cosθ ± senθ))");
    linha("V = velocidade do veículo");
    linha("μ = fator de arrasto pneu/pavimento");
    linha("g = aceleração local da gravidade");
    linha("d = comprimento da marca de frenagem");
    linha("+ para aclive");
    linha("- para declive");
    linha("θ = 0° para via plana");
    y += 4;
  }

  paragrafo(
    "Para propagação das incertezas dos parâmetros de entrada, foi empregado o Método de Monte Carlo, mediante geração aleatória de 15.000 simulações independentes."
  );

  titulo("2. Dados utilizados no cálculo");

  if (params.tipoFator === "normal") {
    linhaCampo("Distribuição do fator de arrasto:", "Normal");
    linhaCampo("Fator de arrasto médio:", textoValor("mi"));
    linhaCampo("Desvio padrão do fator:", textoValor("desvioMi"));
  } else {

    linhaCampo("Fator de arrasto mínimo:", textoValor("miMin"));
    linhaCampo("Fator de arrasto máximo:", textoValor("miMax"));
  }

  if (params.tipoMarca === "normal") {
    linhaCampo("Distribuição da marca de frenagem:", "Normal");
    linhaCampo("Comprimento médio da marca:", `${textoValor("marca")} m`);
    linhaCampo("Desvio padrão da marca:", `${textoValor("desvioMarca")} m`);
  } else {
    linhaCampo("Distribuição da marca de frenagem:", "Uniforme");
    linhaCampo("Comprimento mínimo da marca:", `${textoValor("marcaMin")} m`);
    linhaCampo("Comprimento máximo da marca:", `${textoValor("marcaMax")} m`);
  }

  if (params.tipoTopografia === "plana") {
    linhaCampo("Topografia da via:", "Plana");
    linhaCampo("Inclinação considerada:", "0°");
  } else if (params.tipoTopografia === "aclive") {
    linhaCampo("Topografia da via:", "Aclive");
    linhaCampo("Inclinação média:", `${params.anguloVia.toFixed(1)}°`);
    linhaCampo(
      "Distribuição da inclinação:",
      `Uniforme (${(params.anguloVia - 1).toFixed(1)}° a ${(params.anguloVia + 1).toFixed(1)}°)`
    );
  } else {
    linhaCampo("Topografia da via:", "Declive");
    linhaCampo("Inclinação média:", `${params.anguloVia.toFixed(1)}°`);
    linhaCampo(
      "Distribuição da inclinação:",
      `Uniforme (${(params.anguloVia - 1).toFixed(1)}° a ${(params.anguloVia + 1).toFixed(1)}°)`
    );
  }

  linhaCampo("Latitude considerada:", `${params.latitudeGraus.toFixed(6)}°`);
  linhaCampo("Aceleração da gravidade:", `${r.gravidadeLocalMs2.toFixed(6)} m/s²`);
  linhaCampo("Número de simulações:", "15.000");
  linhaCampo("Menor número de algarismos significativos informado:", algSigResultado);

  y += 4;

  titulo("3. Resultados");

  linhaCampo("Velocidade mais provável:", `${r.velocidadeMaisProvavelKmh.toFixed(2)} km/h`);
  linhaCampo("Desvio padrão:", `${r.desvioPadraoKmh.toFixed(2)} km/h`);
  linhaCampo(
    "Faixa contendo 95% das velocidades simuladas:",
    `${r.intervalo95Kmh[0].toFixed(2)} km/h a ${r.intervalo95Kmh[1].toFixed(2)} km/h`
  );

  y += 4;

  titulo(`4. Resultado arredondado para ${algSigResultado} algarismos significativos`);

  linhaCampo("Velocidade mais provável:", `${mediaSig} km/h`);
  linhaCampo("Desvio padrão:", `${desvioSig} km/h`);
  linhaCampo(
    "Faixa contendo dois desvios padrões (95%) das velocidades simuladas:",
    `${vMinSig} km/h a ${vMaxSig} km/h`
  );

  y += 4;

  const canvas = document.getElementById("histograma");

  if (canvas) {
    desenharHistograma(
      r.velocidades,
      r.velocidadeMaisProvavelMs,
      r.intervalo95Ms[0],
      r.intervalo95Ms[1]
    );

    verificarPagina(100);
    const imagemHistograma = canvas.toDataURL("image/png");
    doc.addImage(imagemHistograma, "PNG", 15, y, 180, 90);
    y += 98;
  }

  titulo("5. Percentis escolhidos");

  paragrafo(
    "Foram adotados os percentis 2,5% e 97,5%, delimitando a faixa central correspondente a aproximadamente 95% das velocidades simuladas. Assim, cerca de 5% das simulações permaneceram fora desse intervalo."
  );

  titulo("6. Observação");

  paragrafo(
    "Os resultados obtidos apresentam distribuição aproximadamente normal. Portanto, o valor mais provável foi adotado como o valor médio das velocidades simuladas, enquanto os limites inferior e superior representam os percentis selecionados da distribuição."
  );

  paragrafo(
    "Os resultados dependem diretamente das hipóteses adotadas e dos parâmetros inseridos pelo usuário, especialmente do fator de arrasto e do comprimento da marca de frenagem. Cabe ao usuário do aplicativo a responsabilidade pela correta inserção dos dados, bem como pela avaliação da adequação do modelo físico ao caso concreto."
  );

  paragrafo(
    "O presente relatório constitui ferramenta de apoio ao cálculo pericial e não substitui a análise técnico-pericial completa do evento."
  );

  doc.save("relatorio_velocidade_frenagem.pdf");
}

function gravidadeLatitude(latitudeGraus) {
  const phi = grausParaRad(latitudeGraus);
  const sin2 = Math.sin(phi) ** 2;
  const sin2_2phi = Math.sin(2 * phi) ** 2;

  return 9.780327 * (1 + 0.0053024 * sin2 - 0.0000058 * sin2_2phi);
}

function normalAleatorio(media, desvioPadrao) {
  let u1 = 0;
  let u2 = 0;

  while (u1 === 0) u1 = Math.random();
  while (u2 === 0) u2 = Math.random();

  const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);

  return media + z * desvioPadrao;
}

function velocidadeMonteCarlo(params) {

  const g = gravidadeLatitude(params.latitudeGraus);
  const n = 15000;
  const velocidades = [];

  for (let i = 0; i < n; i++) {

    // 1. Sorteia comprimento da marca
    let dSorteado;

    if (params.tipoMarca === "uniforme") {
      dSorteado = params.marcaMin + Math.random() * (params.marcaMax - params.marcaMin);
    } else {
      dSorteado = normalAleatorio(params.marca, params.desvioMarca);
    }

   if (dSorteado <= 0) continue;

    // 2. Sorteia fator de arrasto
    let miSorteado;

    if (params.tipoFator === "uniforme") {
      miSorteado = params.miMin + Math.random() * (params.miMax - params.miMin);
    } else {
      miSorteado = normalAleatorio(params.mi, params.desvioMi);
    }

  if (miSorteado <= 0) continue;

    // 3. Sorteia ângulo da topografia
    const anguloGraus = sortearAnguloTopografia(params);
    const theta = grausParaRad(Math.abs(anguloGraus));

    // 4. Aplica correção de aclive/declive
    let fatorTopografico;

    if (params.tipoTopografia === "aclive") {
      fatorTopografico = miSorteado * Math.cos(theta) + Math.sin(theta);
    } else if (params.tipoTopografia === "declive") {
      fatorTopografico = miSorteado * Math.cos(theta) - Math.sin(theta);
    } else {
      fatorTopografico = miSorteado;
    }

    if (fatorTopografico <= 0) {
      continue;
    }

    // 5. Calcula velocidade
    const v = Math.sqrt(2 * g * dSorteado * fatorTopografico);

    velocidades.push(v);
  }

  velocidades.sort((a, b) => a - b);

  const nValido = velocidades.length;

  if (nValido === 0) {
    return null;
  }

  const media = velocidades.reduce((soma, v) => soma + v, 0) / nValido;

  const variancia =
    velocidades.reduce((soma, v) => soma + (v - media) ** 2, 0) / (nValido - 1);

  const desvioPadrao = Math.sqrt(variancia);

  const p2_5 = velocidades[Math.floor(0.025 * nValido)];
  const p97_5 = velocidades[Math.floor(0.975 * nValido)];

  return {
    velocidadeMaisProvavelMs: media,
    velocidadeMaisProvavelKmh: media * 3.6,
    desvioPadraoMs: desvioPadrao,
    desvioPadraoKmh: desvioPadrao * 3.6,
    intervalo95Ms: [p2_5, p97_5],
    intervalo95Kmh: [p2_5 * 3.6, p97_5 * 3.6],
    gravidadeLocalMs2: g,
    velocidades: velocidades,
    simulacoesValidas: nValido
  };
}

function desenharHistograma(velocidades, media, limiteInferior, limiteSuperior) {
  const canvas = document.getElementById("histograma");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const dados = velocidades.map(v => v * 3.6); // km/h
  const min = Math.min(...dados);
  const max = Math.max(...dados);

  const classes = 30;
  const larguraClasse = (max - min) / classes;
  const frequencias = Array(classes).fill(0);

  dados.forEach(v => {
    let indice = Math.floor((v - min) / larguraClasse);
    if (indice >= classes) indice = classes - 1;
    frequencias[indice]++;
  });

  const margemEsq = 55;
  const margemDir = 25;
  const margemSup = 25;
  const margemInf = 55;

  const larguraGrafico = canvas.width - margemEsq - margemDir;
  const alturaGrafico = canvas.height - margemSup - margemInf;

  const maxFreq = Math.max(...frequencias);

  // eixos
  ctx.strokeStyle = "#000000";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margemEsq, margemSup);
  ctx.lineTo(margemEsq, margemSup + alturaGrafico);
  ctx.lineTo(margemEsq + larguraGrafico, margemSup + alturaGrafico);
  ctx.stroke();

  // barras
  ctx.fillStyle = "#072d64"; 
  for (let i = 0; i < classes; i++) {
    const x = margemEsq + i * (larguraGrafico / classes);
    const h = (frequencias[i] / maxFreq) * alturaGrafico;
    const y = margemSup + alturaGrafico - h;

    
    ctx.fillRect(x, y, larguraGrafico / classes - 2, h);
  }

  function escalaX(valor) {
    return margemEsq + ((valor - min) / (max - min)) * larguraGrafico;
  }

  function linhaVertical(valor, texto, cor) {

    const x = escalaX(valor);

    // Descobre em qual barra o valor caiu
    let indice = Math.floor((valor - min) / larguraClasse);
    if (indice >= classes) indice = classes - 1;
    if (indice < 0) indice = 0;

    // altura da barra
    const h = (frequencias[indice] / maxFreq) * alturaGrafico;

    const yBarra = margemSup + alturaGrafico - h;

    ctx.strokeStyle = cor;
    ctx.lineWidth = 2;

ctx.beginPath();
ctx.moveTo(x, yBarra - 10);
ctx.lineTo(x, yBarra);
ctx.stroke();

    ctx.fillStyle = cor;
    ctx.textAlign = "center";
    ctx.fillText(texto, x, margemSup + alturaGrafico + 30);
}
linhaVertical(
    media * 3.6,
    `${(media * 3.6).toFixed(2)}`,
    "#036600"          // verde
);

linhaVertical(
    limiteInferior * 3.6,
    `${(limiteInferior * 3.6).toFixed(2)}`,
    "#d32f2f"          // vermelho
);

linhaVertical(
    limiteSuperior * 3.6,
    `${(limiteSuperior * 3.6).toFixed(2)}`,
    "#d32f2f"          // vermelho
);

  ctx.save();

  ctx.translate(20, margemSup + alturaGrafico / 2);
  ctx.rotate(-Math.PI / 2);

  ctx.textAlign = "center";
  ctx.fillStyle = "#000000";
  ctx.fillText("Frequência", 0, 0);

  ctx.restore();
  
}




function calcular() {

  const tipoMarca = document.getElementById("tipoMarca").value;
  const tipoFator = document.getElementById("tipoFator").value;
  const tipoTopografia = document.getElementById("tipoTopografia").value;

  const params = {
    tipoMarca: tipoMarca,
    tipoFator: tipoFator,
    tipoTopografia: tipoTopografia,

    latitudeGraus: valor("latitude"),

    marca: document.getElementById("marca") ? valor("marca") : null,
    desvioMarca: document.getElementById("desvioMarca") ? valor("desvioMarca") : null,
    marcaMin: document.getElementById("marcaMin") ? valor("marcaMin") : null,
    marcaMax: document.getElementById("marcaMax") ? valor("marcaMax") : null,

    mi: document.getElementById("mi") ? valor("mi") : null,
    desvioMi: document.getElementById("desvioMi") ? valor("desvioMi") : null,
    miMin: document.getElementById("miMin") ? valor("miMin") : null,
    miMax: document.getElementById("miMax") ? valor("miMax") : null,

    anguloVia: document.getElementById("anguloVia") ? valor("anguloVia") : 0
  };

  let algSigMarca;
  let algSigMi;

  if (tipoMarca === "normal") {
    algSigMarca = contarAlgarismosSignificativos(textoValor("marca"));
  } else {
    algSigMarca = Math.min(
      contarAlgarismosSignificativos(textoValor("marcaMin")),
      contarAlgarismosSignificativos(textoValor("marcaMax"))
    );
  }

  if (tipoFator === "normal") {
    algSigMi = contarAlgarismosSignificativos(textoValor("mi"));
  } else {
    algSigMi = Math.min(
      contarAlgarismosSignificativos(textoValor("miMin")),
      contarAlgarismosSignificativos(textoValor("miMax"))
    );
  }

  const algSigResultado = Math.min(algSigMarca, algSigMi);

  if (isNaN(params.latitudeGraus)) {
    document.getElementById("resultado").innerHTML =
      "<p>Preencha corretamente a latitude.</p>";
    return;
  }

  if (tipoMarca === "normal") {
    if (isNaN(params.marca) || isNaN(params.desvioMarca) || params.desvioMarca < 0) {
      document.getElementById("resultado").innerHTML =
        "<p>Preencha corretamente o comprimento da marca e seu desvio padrão.</p>";
      return;
    }

    if (params.desvioMarca > params.marca) {
      alert("Valor inválido: o desvio padrão da marca de frenagem não pode ser maior que o comprimento informado.");
      return;
    }
  }

  if (tipoMarca === "uniforme") {
    if (
      isNaN(params.marcaMin) ||
      isNaN(params.marcaMax) ||
      params.marcaMin < 0 ||
      params.marcaMax <= params.marcaMin
    ) {
      document.getElementById("resultado").innerHTML =
        "<p>Preencha corretamente os valores mínimo e máximo da marca de frenagem.</p>";
      return;
    }
  }

  if (tipoFator === "normal") {
    if (isNaN(params.mi) || isNaN(params.desvioMi) || params.mi < 0 || params.desvioMi < 0) {
      document.getElementById("resultado").innerHTML =
        "<p>Preencha corretamente o fator de arrasto e seu desvio padrão.</p>";
      return;
    }

    if (params.desvioMi > params.mi) {
      alert("Valor inválido: o desvio padrão do fator de arrasto não pode ser maior que o fator de arrasto médio informado.");
      return;
    }
  }

  if (tipoFator === "uniforme") {
    if (
      isNaN(params.miMin) ||
      isNaN(params.miMax) ||
      params.miMin < 0 ||
      params.miMax <= params.miMin
    ) {
      document.getElementById("resultado").innerHTML =
        "<p>Preencha corretamente os valores mínimo e máximo do fator de arrasto.</p>";
      return;
    }
  }

  if (tipoTopografia !== "plana") {
    if (isNaN(params.anguloVia) || params.anguloVia < 0) {
      document.getElementById("resultado").innerHTML =
        "<p>Preencha corretamente a inclinação média da via.</p>";
      return;
    }
  }

  const r = velocidadeMonteCarlo(params);

  if (!r) {
    document.getElementById("resultado").innerHTML =
      "<p>Não foi possível calcular. Verifique os parâmetros informados.</p>";
    return;
  }

const mediaSig = arredondarSig(r.velocidadeMaisProvavelKmh, algSigResultado);

const casas = mediaSig.toString().includes(".")
  ? mediaSig.toString().split(".")[1].length
  : 0;

const desvioSig = r.desvioPadraoKmh.toFixed(casas);
const vMinSig = r.intervalo95Kmh[0].toFixed(casas);
const vMaxSig = r.intervalo95Kmh[1].toFixed(casas);

let html = `
  <h3>Resultado por Monte Carlo</h3>
  <p><strong>Velocidade mais provável:</strong> ${r.velocidadeMaisProvavelKmh.toFixed(2)} km/h</p>
  <p><strong>Desvio padrão:</strong> ${r.desvioPadraoKmh.toFixed(2)} km/h</p>
  <p><strong>Faixa contendo 95% das velocidades simuladas:</strong> 
  ${r.intervalo95Kmh[0].toFixed(2)} km/h a ${r.intervalo95Kmh[1].toFixed(2)} km/h</p>
  <p><strong>Gravidade local:</strong> ${r.gravidadeLocalMs2.toFixed(6)} m/s²</p>
  <p><strong>Simulações válidas:</strong> ${r.simulacoesValidas}</p>
  <p><strong>Menor número de algarismos significativos informado:</strong> ${algSigResultado}</p>

  <hr>

<h3>Resultado arredondado para ${algSigResultado} algarismos significativos</h3>
<p><strong>Velocidade mais provável:</strong> ${mediaSig} km/h</p>
<p><strong>Desvio padrão:</strong> ${desvioSig} km/h</p>
<p><strong>Faixa contendo dois desvios padrões (95%) das velocidades simuladas:</strong> 
${vMinSig} km/h a ${vMaxSig} km/h</p>
`;

  document.getElementById("resultado").innerHTML = html;

  desenharHistograma(
    r.velocidades,
    r.velocidadeMaisProvavelMs,
    r.intervalo95Ms[0],
    r.intervalo95Ms[1]
  );
}

</script>
